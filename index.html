<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabHist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="login">Login</h1>
        <div class="name">
            <input type="text" placeholder="Digite seu usuário" required>
        </div>
        <div class="password">
            <input type="password" name="senha" id="isenha" placeholder="Digite sua senha" required>
        </div>
        <div class="forgot-password">
            <a href="#">Esqueceu a senha?</a>
            <p class="cadastro">Não tem uma conta? <a href="#">Cadastre-se!</a></p>
        </div>
        <div class="icons">
            <a class="icon" href="#"></a>
            <a class="icon" href="#"></a>
            <a class="icon" href="#"></a>
            <a class="icon" href="#"></a>
        </div>

        <div class="submit">
            <button class="confirm" type="submit">Login</button>
        </div>

        <div>
            <button class="login-button" type="button">Entrar com o <img class="google-icon" src="icons/google.png" alt="google"> </button>
            <button class="login-button" type="button">Entrar com a <img class="apple-icon" src="icons/logotipo-da-apple.png" alt="apple"> </button>
        </div>
    </div>
</body>
</html>
