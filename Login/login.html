<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabHist</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <img src="imgs/logo.png" alt="LabHist" class="logo">
      <h1 class="login">LOGIN</h1>

      <input type="text" placeholder="Usuário" id="usuario" required>
      <input type="password" placeholder="Senha" id="senha" required>

      <a href="#" class="forgot">Esqueceu sua senha?</a>

      <button class="confirm" id="botao">Entrar</button>
      <p id="para"></p>

      <div class="divider">ou</div>

      <button class="login-button google">
        <img src="icons/google.png"> Entrar com Google
      </button>

      <button class="login-button apple">
        <img class="apple1" src="icons/apple logo.jpg"> 
          Entrar com Apple
      </button>

      <p class="cadastro"> Não tem uma conta? <a href="#">Cadastre-se</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
