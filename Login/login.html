<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabHist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <img src="../assets/logo.png" alt="LabHist" class="logo">
      <h1 class="login">LOGIN</h1>

      <!-- Seleção de perfil -->
      <div class="role-group">
        <p>Perfil de acesso</p>
        <div class="role-options">
          <div class="role-option">
            <input type="radio" name="perfil" id="administrador" value="administrador">
            <label for="administrador">
              <span class="icon">🛡️</span>
              Administrador
            </label>
          </div>
          <div class="role-option">
            <input type="radio" name="perfil" id="professor" value="professor" checked>
            <label for="professor">
              <span class="icon">📚</span>
              Professor
            </label>
          </div>
          <div class="role-option">
            <input type="radio" name="perfil" id="aluno" value="aluno">
            <label for="aluno">
              <span class="icon">🎓</span>
              Aluno
            </label>
          </div>
        </div>
      </div>

      <input type="text" placeholder="Usuário" id="usuario" required>
      <input type="password" placeholder="Senha" id="senha" required>

      <a href="#" class="forgot">Esqueceu sua senha?</a>

      <button class="confirm" id="botao">Entrar</button>
      <p id="para"></p>
      <p class="visitante"> Gostaria de conhecer-nos? <a href="#">Entrar como visitante</a></p>
    </div>
  </div>

  <script src="LoginValidation.js"></script>
</body>
</html>
